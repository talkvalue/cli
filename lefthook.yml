pre-commit:
  parallel: true
  commands:
    lint:
      glob: "*.ts"
      run: npx biome check --no-errors-on-unmatched {staged_files}
    typecheck:
      run: npx tsc --noEmit --skipLibCheck

commit-msg:
  commands:
    commitlint:
      run: |
        msg=$(head -1 "$1")
        if ! echo "$msg" | grep -qE '^(feat|fix|chore|refactor|test|docs|build|ci|perf|style|revert)(\(.+\))?!?: .+'; then
          echo "ERROR: Commit message must follow conventional commits format"
          echo "  e.g., feat(auth): add login command"
          echo "  Got: $msg"
          exit 1
        fi
